aid: reflect
name: Reflect
description: >-
  Reflect is an AI-powered automated end-to-end testing platform that enables
  teams to effortlessly create, execute, and troubleshoot automated browser
  tests. Reflect provides a no-code test recorder for capturing user workflows
  and a REST API for integrating test execution into CI/CD pipelines. Tests
  can be run against any environment using hostname and parameter overrides.
type: Index
image: https://reflect.run/assets/logo.png
