naftiko: 1.0.0-alpha2
info:
  label: Reflect — Tests
  description: 'Reflect — Tests. 2 operations. Lead operation: List All Tests. Self-contained Naftiko capability covering
    one Reflect business surface.'
  tags:
  - Reflect
  - Tests
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    REFLECT_API_KEY: REFLECT_API_KEY
capability:
  consumes:
  - type: http
    namespace: reflect-tests
    baseUri: https://api.reflect.run/v1
    description: Reflect — Tests business capability. Self-contained, no shared references.
    resources:
    - name: tests
      path: /tests
      operations:
      - name: get
        method: GET
        description: List All Tests
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tests-test-id-executions
      path: /tests/{test-id}/executions
      operations:
      - name: post
        method: POST
        description: Run a Test
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: test-id
          in: path
          type: integer
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.REFLECT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: reflect-tests-rest
    port: 8080
    description: REST adapter for Reflect — Tests. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/tests
      name: tests
      description: REST surface for tests.
      operations:
      - method: GET
        name: get
        description: List All Tests
        call: reflect-tests.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tests/{test-id}/executions
      name: tests-test-id-executions
      description: REST surface for tests-test-id-executions.
      operations:
      - method: POST
        name: post
        description: Run a Test
        call: reflect-tests.post
        with:
          test-id: rest.test-id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reflect-tests-mcp
    port: 9090
    transport: http
    description: MCP adapter for Reflect — Tests. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-tests
      description: List All Tests
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reflect-tests.get
      outputParameters:
      - type: object
        mapping: $.
    - name: run-test
      description: Run a Test
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: reflect-tests.post
      with:
        test-id: tools.test-id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
