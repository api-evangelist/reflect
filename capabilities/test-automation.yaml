naftiko: 1.0.0-alpha2
info:
  label: Reflect Test Automation
  description: Workflow capability for QA engineers and DevOps teams managing and executing automated end-to-end tests through
    the Reflect API. Supports listing available tests, triggering test runs with parameter overrides, and monitoring execution
    status for CI/CD pipeline integration.
  tags:
  - Reflect
  - Testing
  - Automation
  - CI/CD
  - End-to-End Tests
  - QA
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    REFLECT_API_KEY: REFLECT_API_KEY
capability:
  consumes:
  - type: http
    namespace: reflect
    baseUri: https://api.reflect.run/v1
    description: Reflect API for test management and execution.
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{REFLECT_API_KEY}}'
      placement: header
    resources:
    - name: tests
      path: /tests
      description: Test management.
      operations:
      - name: list-tests
        method: GET
        description: List all tests in the account.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: run-test
        method: POST
        description: Execute a specific test by ID.
        inputParameters:
        - name: test-id
          in: path
          type: integer
          required: true
          description: The ID of the test to run.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            overrides:
              hostnames: '{{tools.hostnames}}'
              parameters: '{{tools.parameters}}'
              headers: '{{tools.headers}}'
            variables: '{{tools.variables}}'
            emailFailures: '{{tools.emailFailures}}'
    - name: executions
      path: /executions
      description: Test execution status.
      operations:
      - name: get-execution-status
        method: GET
        description: Get the status of a specific test execution.
        inputParameters:
        - name: execution-id
          in: path
          type: integer
          required: true
          description: The ID of the execution to check.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: reflect-automation-api
    description: Unified REST API for Reflect test automation workflows.
    resources:
    - path: /v1/tests
      name: tests
      description: Available tests catalog.
      operations:
      - method: GET
        name: list-tests
        description: List all automated end-to-end tests.
        call: reflect.list-tests
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tests/{testId}/executions
      name: test-runs
      description: Test execution triggers.
      operations:
      - method: POST
        name: run-test
        description: Trigger a test run.
        call: reflect.run-test
        with:
          test-id: rest.testId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/executions/{executionId}
      name: executions
      description: Test execution status.
      operations:
      - method: GET
        name: get-execution-status
        description: Check test execution status.
        call: reflect.get-execution-status
        with:
          execution-id: rest.executionId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: reflect-automation-mcp
    transport: http
    description: MCP server for AI-assisted Reflect test automation.
    tools:
    - name: list-tests
      description: List all automated end-to-end tests available in the Reflect account.
      hints:
        readOnly: true
        openWorld: false
      call: reflect.list-tests
      outputParameters:
      - type: object
        mapping: $.
    - name: run-test
      description: Trigger a Reflect automated test execution, with optional overrides for target hostnames, parameters, cookies,
        headers, and session storage.
      hints:
        readOnly: false
        openWorld: false
      call: reflect.run-test
      with:
        test-id: tools.testId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-execution-status
      description: Check the current status of a Reflect test execution and retrieve per-test results.
      hints:
        readOnly: true
        openWorld: false
      call: reflect.get-execution-status
      with:
        execution-id: tools.executionId
      outputParameters:
      - type: object
        mapping: $.
