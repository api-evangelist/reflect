naftiko: 1.0.0-alpha2
info:
  label: Reflect — Executions
  description: 'Reflect — Executions. 2 operations. Lead operation: Get Execution Status. Self-contained Naftiko capability
    covering one Reflect business surface.'
  tags:
  - Reflect
  - Executions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    REFLECT_API_KEY: REFLECT_API_KEY
capability:
  consumes:
  - type: http
    namespace: reflect-executions
    baseUri: https://api.reflect.run/v1
    description: Reflect — Executions business capability. Self-contained, no shared references.
    resources:
    - name: executions-execution-id
      path: /executions/{execution-id}
      operations:
      - name: get
        method: GET
        description: Get Execution Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: execution-id
          in: path
          type: integer
          required: true
    - name: tests-test-id-executions
      path: /tests/{test-id}/executions
      operations:
      - name: post
        method: POST
        description: Run a Test
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: test-id
          in: path
          type: integer
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.REFLECT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: reflect-executions-rest
    port: 8080
    description: REST adapter for Reflect — Executions. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/executions/{execution-id}
      name: executions-execution-id
      description: REST surface for executions-execution-id.
      operations:
      - method: GET
        name: get
        description: Get Execution Status
        call: reflect-executions.get
        with:
          execution-id: rest.execution-id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tests/{test-id}/executions
      name: tests-test-id-executions
      description: REST surface for tests-test-id-executions.
      operations:
      - method: POST
        name: post
        description: Run a Test
        call: reflect-executions.post
        with:
          test-id: rest.test-id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reflect-executions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Reflect — Executions. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-execution-status
      description: Get Execution Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reflect-executions.get
      with:
        execution-id: tools.execution-id
      outputParameters:
      - type: object
        mapping: $.
    - name: run-test
      description: Run a Test
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: reflect-executions.post
      with:
        test-id: tools.test-id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
